<div class="contenedor">
  <div class="card">
    <div class="header">
      <h2>Lista de usuarios</h2>
      <a routerLink="/admin/usuarios/crear" class="btn-secundario">Crear usuario</a>
    </div>

    <div class="table-wrapper">
      <table class="tabla-usuarios">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Rol</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of usuarios">
          <td>{{ u.nombre }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.rol }}</td>
        </tr>
        <tr *ngIf="usuarios.length === 0">
          <td colspan="3">No hay usuarios registrados</td>
        </tr>
      </tbody>
      </table>
    </div>
  </div>
</div>
