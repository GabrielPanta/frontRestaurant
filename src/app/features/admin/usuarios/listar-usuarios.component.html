<div class="page-container">
  <header class="page-header">
    <h2>Gestión de Usuarios</h2>
    <a routerLink="/admin/usuarios/crear" class="btn btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><line x1="19" y1="8" x2="19" y2="14"></line><line x1="16" y1="11" x2="22" y2="11"></line></svg>
      Crear usuario
    </a>
  </header>

  <div class="data-table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Correo Electrónico</th>
          <th>Rol Asignado</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of usuarios">
          <td><strong>{{ u.nombre }}</strong></td>
          <td>{{ u.email }}</td>
          <td>
            <span class="badge" [ngClass]="{
              'badge-primary': u.rol === 'ADMIN',
              'badge-success': u.rol === 'MOZO',
              'badge-warning': u.rol === 'COCINA'
            }">{{ u.rol }}</span>
          </td>
        </tr>
        <tr *ngIf="usuarios.length === 0">
          <td colspan="3" style="text-align: center; color: var(--text-muted); padding: 40px;">
            No hay usuarios registrados actualmente.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
