<div class="kds-container">
  <!-- Header -->
  <header class="kds-header">
    <div class="brand">
      <span class="icon">🍳</span>
      <h1>KDS System</h1>
    </div>
    <div class="kds-stats">
      <div class="stat-item">
        <span class="label">Pendientes</span>
        <span class="value">{{ pedidos.length }}</span>
      </div>
    </div>
  </header>

  <!-- Empty State -->
  <div *ngIf="pedidos.length === 0" class="kds-empty">
    <div class="celebrate">✨</div>
    <h2>¡Cocina al día!</h2>
    <p>No hay pedidos pendientes en este momento.</p>
  </div>

  <!-- Grid de Pedidos -->
  <div class="kds-grid">
    <div class="kds-ticket" 
         *ngFor="let pedido of pedidos"
         [ngClass]="getEstadoClase(pedido.fecha)">
      
      <header class="ticket-header">
        <div class="id-area">
          <span class="order-id">#{{ pedido.id }}</span>
          <span class="mesa-badge">Mesa {{ pedido.mesa.numero }}</span>
        </div>
        <div class="timer">
          <span class="clock">⏱️</span>
          {{ getMinutosTranscurridos(pedido.fecha) }} min
        </div>
      </header>

      <section class="ticket-body">
        <div class="item-row" *ngFor="let item of detalles[pedido.id] || []">
          <ng-container *ngIf="item.estado !== 'LISTO'">
            <div class="qty">{{ item.cantidad }}</div>
            <div class="name">{{ item.menuItem.nombre }}</div>
          </ng-container>
        </div>
      </section>

      <footer class="ticket-footer">
        <button class="btn-complete" (click)="marcarListo(pedido.id)">
          MARCAR LISTO
        </button>
      </footer>
    </div>
  </div>
</div>
